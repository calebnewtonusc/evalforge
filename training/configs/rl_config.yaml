# EvalForge GRPO RL Training Configuration

model:
  name: checkpoints/evalforge-sft  # Start from SFT checkpoint
  torch_dtype: bfloat16

grpo:
  num_generations: 8          # Group size (G) in GRPO
  max_new_tokens: 1024
  temperature: 0.9
  kl_coef: 0.01

reward:
  weights:
    shortcut_detection: 0.50
    format_validity: 0.30
    downstream_correlation: 0.20

training:
  num_train_epochs: 1
  per_device_train_batch_size: 4
  learning_rate: 1.0e-5
  lr_scheduler_type: cosine
  warmup_ratio: 0.05
  bf16: true

checkpointing:
  output_dir: checkpoints/evalforge-rl
  save_steps: 100
  save_total_limit: 2

logging:
  logging_steps: 10
  report_to: wandb
  run_name: evalforge-grpo-v1

deepspeed: training/configs/deepspeed_zero3.json
