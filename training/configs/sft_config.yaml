# EvalForge SFT Training Configuration
# Used by training/train.py

model:
  name: Qwen/Qwen2.5-7B-Coder-Instruct
  attn_implementation: flash_attention_2
  torch_dtype: bfloat16

lora:
  r: 64
  lora_alpha: 128
  lora_dropout: 0.05
  target_modules:
    - q_proj
    - k_proj
    - v_proj
    - o_proj
    - gate_proj
    - up_proj
    - down_proj
  bias: none
  task_type: CAUSAL_LM

training:
  num_train_epochs: 3
  per_device_train_batch_size: 1
  per_device_eval_batch_size: 1
  gradient_accumulation_steps: 8
  gradient_checkpointing: true
  learning_rate: 2.0e-4
  lr_scheduler_type: cosine
  warmup_ratio: 0.03
  weight_decay: 0.01
  max_seq_length: 4096
  bf16: true
  fp16: false

data:
  train_file: data/train/evalforge_train.jsonl
  val_file: data/train/evalforge_val.jsonl
  text_field: text

checkpointing:
  output_dir: checkpoints/evalforge-sft
  save_strategy: steps
  save_total_limit: 3
  load_best_model_at_end: true

logging:
  logging_steps: 10
  report_to: wandb
  run_name: evalforge-sft-v1

deepspeed: training/configs/deepspeed_zero3.json
